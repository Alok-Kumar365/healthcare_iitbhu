
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--primary:#0891b2;--primary-dark:#0e7490;--primary-light:#cffafe;
--success:#10b981;--danger:#ef4444;--warning:#f59e0b;
--navy:#0f172a;--slate:#1e293b;--muted:#64748b;
--bg:#f0f9ff;--surface:#ffffff;--border:#e0f2fe;
--text:#0f172a;--text2:#475569;--text3:#94a3b8;
--r:12px;--r-sm:8px;--r-lg:16px;
--font-head:'Sora',sans-serif;--font-body:'DM Sans',sans-serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:var(--font-head)}
button{cursor:pointer;font-family:var(--font-body);border:none;outline:none}
input,textarea,select{font-family:var(--font-body);outline:none;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;width:100%;background:var(--surface);color:var(--text);font-size:14px;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--primary)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r-sm);font-size:13px;font-weight:500;transition:all .2s;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:#fee2e2;color:var(--danger)}
.btn-success{background:#d1fae5;color:var(--success)}
.card{background:var(--surface);border-radius:var(--r-lg);border:1.5px solid var(--border);padding:20px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-teal{background:#cffafe;color:#0e7490}
.badge-green{background:#d1fae5;color:#065f46}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-purple{background:#ede9fe;color:#5b21b6}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--navy);color:#fff;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h2{font-family:var(--font-head);font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.sidebar-logo span{background:var(--primary);width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.sidebar-section{padding:12px 0}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;color:#64748b;padding:8px 20px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#94a3b8;font-size:13px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(8,145,178,.15);color:#22d3ee;border-left-color:#22d3ee}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.main{margin-left:240px;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600;font-family:var(--font-head)}
.topbar-right{display:flex;align-items:center;gap:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.content{padding:28px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{background:var(--surface);border-radius:var(--r-lg);border:1.5px solid var(--border);padding:18px;display:flex;align-items:center;gap:14px}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.stat-value{font-size:22px;font-weight:700;font-family:var(--font-head);line-height:1.2}
.stat-change{font-size:11px;margin-top:2px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:600;font-family:var(--font-head)}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#0e7490 50%,#0f172a 100%);position:relative;overflow:hidden}
.auth-wrap::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.auth-card{background:var(--surface);border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 25px 60px rgba(0,0,0,.3);position:relative;z-index:1}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo h1{font-size:26px;font-weight:700;color:var(--primary);font-family:var(--font-head)}
.auth-logo p{color:var(--text3);font-size:13px;margin-top:4px}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.role-btn{padding:12px;border-radius:var(--r-sm);border:2px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;text-align:center}
.role-btn.selected{border-color:var(--primary);background:#e0f2fe;color:var(--primary)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.tabs{display:flex;background:#f1f5f9;border-radius:var(--r-sm);padding:3px;margin-bottom:24px}
.tab{flex:1;padding:8px;border-radius:6px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text3)}
.tab.active{background:var(--surface);color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 120px)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:75%;display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:13.5px;line-height:1.65}
.msg.assistant .msg-bubble{background:var(--surface);border:1.5px solid var(--border);border-radius:4px 16px 16px 16px;color:var(--text)}
.msg.user .msg-bubble{background:var(--primary);color:#fff;border-radius:16px 4px 16px 16px}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.assistant .msg-avatar{background:#e0f2fe;color:var(--primary)}
.msg.user .msg-avatar{background:var(--primary-light);color:var(--primary-dark)}
.chat-input-area{padding:16px 20px;background:var(--surface);border-top:1.5px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.chat-input-area textarea{border-radius:12px;resize:none;max-height:120px;background:#f8fafc}
.chat-send{width:42px;height:42px;border-radius:12px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.chat-send:hover{background:var(--primary-dark)}
.chat-send:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.typing-indicator{display:flex;gap:5px;padding:14px 16px;align-items:center}
.typing-dot{width:8px;height:8px;background:var(--text3);border-radius:50%;animation:bounce .8s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.disclaimer{background:#fef3c7;border:1.5px solid #fde68a;border-radius:var(--r-sm);padding:10px 14px;font-size:12px;color:#92400e;margin:0 20px 12px;display:flex;gap:8px;align-items:flex-start}
.symptom-chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 20px;border-bottom:1.5px solid var(--border)}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .2s}
.chip:hover{border-color:var(--primary);color:var(--primary)}

/* VITALS */
.vital-input-card{background:var(--surface);border-radius:var(--r-lg);border:1.5px solid var(--border);padding:20px}
.vital-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.vital-item{text-align:center}
.vital-reading{font-size:28px;font-weight:700;font-family:var(--font-head);color:var(--primary)}
.vital-unit{font-size:12px;color:var(--text3)}
.vital-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-good{background:var(--success)}
.status-warn{background:var(--warning)}
.status-bad{background:var(--danger)}

/* APPOINTMENTS */
.appt-item{background:var(--surface);border-radius:var(--r-lg);border:1.5px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:16px}
.appt-time{text-align:center;min-width:56px}
.appt-time .time{font-size:16px;font-weight:700;font-family:var(--font-head);color:var(--primary)}
.appt-time .date{font-size:10px;color:var(--text3)}
.appt-divider{width:1.5px;background:var(--border);align-self:stretch}
.appt-info{flex:1}
.appt-doc{font-weight:600;font-size:14px}
.appt-spec{font-size:12px;color:var(--text3);margin-top:2px}

/* ARTICLES */
.article-card{background:var(--surface);border-radius:var(--r-lg);border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.article-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(8,145,178,.1)}
.article-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:40px}
.article-body{padding:16px}
.article-title{font-weight:600;font-size:14px;line-height:1.4;margin-bottom:6px;font-family:var(--font-head)}
.article-meta{font-size:11px;color:var(--text3)}

/* NOTIF */
.notif-item{display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--border)}
.notif-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-title{font-size:13px;font-weight:500}
.notif-time{font-size:11px;color:var(--text3);margin-top:2px}
.unread-dot{width:8px;height:8px;background:var(--primary);border-radius:50%;margin-top:4px;flex-shrink:0}

/* DOCTOR DASH */
.patient-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.patient-row:last-child{border-bottom:none}
.progress-bar{height:6px;background:#e0f2fe;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .6s}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--surface);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700;font-family:var(--font-head)}

.tag-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tag{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;background:var(--surface);color:var(--text2)}
.tag.active{background:var(--primary);border-color:var(--primary);color:#fff}
.search-bar{position:relative;margin-bottom:20px}
.search-bar input{padding-left:36px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chart-wrap{position:relative;width:100%;height:200px;margin-top:8px}
.section-sep{height:1px;background:var(--border);margin:20px 0}
.landing-screen{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#164e63 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:40px 20px}

.emer-btn{background:#ef4444;color:#fff;padding:12px 24px;border-radius:var(--r-sm);font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;width:100%;justify-content:center}

</style>

async function callClaude(messages){
  const res = await fetch(API_URL,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': ANTHROPIC_API_KEY
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:`You are MediMind AI, a compassionate and knowledgeable health assistant integrated into a healthcare platform. Your responsibilities:
1. Answer health questions with empathy and clarity
2. Analyze symptoms and suggest possible conditions (always with disclaimer to see a doctor)
3. Provide evidence-based health, diet, exercise, and lifestyle recommendations
4. Help users understand medical terms and procedures
5. Offer mental health support and stress management tips

Rules:
- Always include a brief disclaimer for serious symptoms
- Be warm, empathetic, and non-alarmist
- Use simple language, avoid excessive jargon
- Format responses clearly with bullet points when listing multiple items
- Keep responses concise but comprehensive (2-4 paragraphs max)
- If emergency symptoms mentioned (chest pain, stroke signs), always say seek emergency care immediately`,
      messages
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || 'I apologize, I could not process that request. Please try again.';
}

function formatAIText(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^• /gm,'<br>• ')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}

function quickSymptom(s){document.getElementById('chatInput').value=`I'm experiencing ${s.toLowerCase()}. What could this be?`;sendChat()}

async function sendChat(){
  const input = document.getElementById('chatInput');
  const msg = (input?.value||'').trim();
  if(!msg||state.chatLoading)return;
  const newMessages = [...state.chatMessages,{role:'user',content:msg}];
  setState({chatMessages:newMessages,chatLoading:true,chatInput:''});
  if(input)input.value='';
  setTimeout(()=>{const el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},100);
  try{
    const aiReply = await callClaude(newMessages.map(m=>({role:m.role,content:m.content})));
    setState({chatMessages:[...newMessages,{role:'assistant',content:aiReply}],chatLoading:false});
  }catch(e){
    setState({chatMessages:[...newMessages,{role:'assistant',content:'I apologize, there was a connection issue. Please check your API key and try again.'}],chatLoading:false});
  }
  setTimeout(()=>{const el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},100);
}

      <button class="btn btn-primary" style="margin-top:16px" onclick="setPage('chat');setTimeout(()=>{const i=document.getElementById('chatInput');if(i){i.value='Tell me more about ${art.title.split(':')[0]}';sendChat();}},200)">🤖 Ask AI About This Topic</button>
    </div>
    </div>`;
  }
  return `<div class="content fade-in">
  <div class="search-bar"><span class="search-icon">${svgIcon('search')}</span><input type="text" placeholder="Search articles by topic, condition, or keyword..." value="${state.articleSearch}" oninput="setState({articleSearch:this.value})"/></div>
  <div class="tag-filter">${cats.map(c=>`<div class="tag ${state.articleCategory===c?'active':''}" onclick="setState({articleCategory:'${c}'})">${c}</div>`).join('')}</div>
  ${filtered.length===0?`<div class="empty"><div class="empty-icon">📚</div><p>No articles found for "${state.articleSearch}"</p></div>`:
  `<div class="grid3">${filtered.map(a=>`
  <div class="article-card" onclick="setState({selectedArticle:${a.id}})">
    <div class="article-img" style="background:${a.bg}">${a.emoji}</div>
    <div class="article-body">
      <span class="badge badge-teal" style="margin-bottom:8px">${a.category}</span>
      <div class="article-title">${a.title}</div>
      <div class="article-meta">📖 ${a.read} read • 🤖 AI-curated</div>
    </div>
  </div>`).join('')}</div>`}
</div>`;
}

function markAllRead(){
  setState({notifications:state.notifications.map(n=>({...n,read:true}))});
}
function markRead(id){
  setState({notifications:state.notifications.map(n=>n.id===id?{...n,read:true}:n)});
}
function toggleNotifSetting(id,el){
  const dot = el.querySelector('div');
  const isOn = el.style.background.includes('8,145,178')||el.style.background===getComputedStyle(document.documentElement).getPropertyValue('--primary').trim()||el.getAttribute('data-on')==='true';
  el.style.background = isOn?'var(--border)':'var(--primary)';
  dot.style.left = isOn?'3px':'22px';
}

function initCharts(){
  // BP Chart on dashboard
  const bpCanvas = document.getElementById('bpChart');
  if(bpCanvas){
    const existing = Chart.getChart(bpCanvas);
    if(existing)existing.destroy();
    new Chart(bpCanvas,{
      type:'line',
      data:{
        labels:VITALS_HISTORY.bp.map(v=>v.date),
        datasets:[
          {label:'Systolic',data:VITALS_HISTORY.bp.map(v=>v.sys),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.08)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#ef4444'},
          {label:'Diastolic',data:VITALS_HISTORY.bp.map(v=>v.dia),borderColor:'#0891b2',backgroundColor:'rgba(8,145,178,.08)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#0891b2'}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,min:70,grid:{color:'rgba(0,0,0,.05)'}},x:{grid:{display:false}}}}
    });
  }
  initVitalsChart();
}

function initVitalsChart(){
  const canvas = document.getElementById('vitalsChart');
  if(!canvas)return;
  const existing = Chart.getChart(canvas);
  if(existing)existing.destroy();
  const type = state.vitalsChartType||'bp';
  let data,label,color;
  if(type==='bp'){
    data=VITALS_HISTORY.bp.map(v=>v.sys);label='Systolic BP';color='#ef4444';
  }else if(type==='sugar'){
    data=VITALS_HISTORY.sugar.map(v=>v.val);label='Blood Sugar';color='#f59e0b';
  }else{
    data=VITALS_HISTORY.weight.map(v=>v.val);label='Weight (kg)';color='#10b981';
  }
  new Chart(canvas,{
    type:'line',
    data:{labels:VITALS_HISTORY.bp.map(v=>v.date),datasets:[{label,data,borderColor:color,backgroundColor:color.replace('#','rgba(').replace(/^rgba\(([a-f0-9]{2})([a-f0-9]{2})([a-f0-9]{2})/i,(m,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`)+',.1)',tension:.4,fill:true,pointRadius:5,pointBackgroundColor:color}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,.05)'}},x:{grid:{display:false}}}}
  });
}

function renderApp(){
  const page = state.activePage;
  let content = '';
  if(page==='dashboard') content=renderDashboard();
  else if(page==='chat') content=renderChat();
  else if(page==='vitals') content=renderVitals();
  else if(page==='appointments') content=renderAppointments();
  else if(page==='hub') content=renderHub();
  else if(page==='notifications') content=renderNotifications();
  else if(page==='profile') content=renderProfile();
  else if(page==='patients') content=renderPatients();
  return `${renderSidebar()}<div class="main">${renderTopbar()}${content}</div>`;
}

function render(){
  const app = document.getElementById('app');
  if(state.screen==='landing') app.innerHTML=renderLanding();
  else if(state.screen==='auth') app.innerHTML=renderAuth();
  else if(state.screen==='app') app.innerHTML=renderApp();
  if(state.screen==='app'){
    setTimeout(initCharts,300);
  }
}

render();
</script>
